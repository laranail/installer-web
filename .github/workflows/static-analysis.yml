name: Static analysis

on:
  push:
    branches: [main]
  pull_request:

jobs:
  static:
    name: Pint · PHPStan · Rector
    runs-on: ubuntu-latest
    env:
      # Authenticate composer's GitHub API access so VCS resolution of sibling
      # laranail packages isn't rate-limited (HTTP 429) on unauthenticated runners.
      COMPOSER_AUTH: '{"github-oauth":{"github.com":"${{ secrets.GITHUB_TOKEN }}"}}'
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: dom, curl, libxml, mbstring, zip, fileinfo, sodium
          coverage: none
      # Only installer-headless + its transitive license-verifier aren't on Packagist;
      # git-clone them (no-api) to dodge GitHub REST API rate limits.
      - name: Resolve unpublished laranail packages from VCS
        run: |
          composer config repositories.installer-headless '{"type":"vcs","url":"https://github.com/laranail/installer-headless","no-api":true}'
          composer config repositories.license-verifier '{"type":"vcs","url":"https://github.com/laranail/license-verifier","no-api":true}'
      - name: Install dependencies
        run: composer update --prefer-stable --no-interaction --no-progress
      - name: Pint
        run: vendor/bin/pint --test
      - name: PHPStan
        run: vendor/bin/phpstan analyse --no-progress --error-format=github
      - name: Rector
        run: vendor/bin/rector process --dry-run --no-progress-bar
