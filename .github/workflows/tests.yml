name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pest:
    name: PHP ${{ matrix.php }} · ${{ matrix.dependency-versions }}
    runs-on: ubuntu-latest
    env:
      # Authenticate composer's GitHub API access so VCS resolution of sibling
      # laranail packages isn't rate-limited (HTTP 429) on unauthenticated runners.
      COMPOSER_AUTH: '{"github-oauth":{"github.com":"${{ secrets.GITHUB_TOKEN }}"}}'
    strategy:
      fail-fast: false
      matrix:
        php: ['8.4', '8.5']
        dependency-versions: ['prefer-lowest', 'prefer-stable']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, fileinfo, pdo, sqlite3, pdo_sqlite, sodium
          coverage: none
      # Override every committed `path` repo with its public GitHub source.
      # `no-api: true` git-clones instead of using the GitHub REST API (avoids 429).
      - name: Resolve laranail packages from VCS
        run: |
          for pkg in installer-headless package-tools console license-verifier; do
            composer config "repositories.$pkg" "{\"type\":\"vcs\",\"url\":\"https://github.com/laranail/$pkg\",\"no-api\":true}"
          done
      - name: Install dependencies
        run: |
          if [ "${{ matrix.dependency-versions }}" = "prefer-lowest" ]; then
            composer update --prefer-lowest --prefer-stable --no-interaction --no-progress
          else
            composer update --prefer-stable --no-interaction --no-progress
          fi
      - name: Run Pest
        run: vendor/bin/pest --colors=always
