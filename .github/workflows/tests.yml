name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pest:
    name: PHP ${{ matrix.php }} · ${{ matrix.dependency-versions }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.4', '8.5']
        dependency-versions: ['prefer-lowest', 'prefer-stable']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, fileinfo, pdo, sqlite3, pdo_sqlite, sodium
          coverage: none
      # CI has no local sibling checkouts; override the `path` repos (used for
      # local dev) with their public VCS sources before installing.
      - name: Resolve laranail packages from VCS
        run: |
          composer config repositories.installer-headless vcs https://github.com/laranail/installer-headless
          composer config repositories.package-tools vcs https://github.com/laranail/package-tools
          composer config repositories.console vcs https://github.com/laranail/console
          composer config repositories.license-verifier vcs https://github.com/laranail/license-verifier
      - name: Install dependencies
        run: |
          if [ "${{ matrix.dependency-versions }}" = "prefer-lowest" ]; then
            composer update --prefer-lowest --prefer-stable --no-interaction --no-progress
          else
            composer update --prefer-stable --no-interaction --no-progress
          fi
      - name: Run Pest
        run: vendor/bin/pest --colors=always
