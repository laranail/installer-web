name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pest:
    name: PHP ${{ matrix.php }} · ${{ matrix.dependency-versions }}
    runs-on: ubuntu-latest
    env:
      # Authenticate composer's GitHub API access so VCS resolution of sibling
      # laranail packages isn't rate-limited (HTTP 429) on unauthenticated runners.
      COMPOSER_AUTH: '{"github-oauth":{"github.com":"${{ secrets.GITHUB_TOKEN }}"}}'
    strategy:
      fail-fast: false
      matrix:
        php: ['8.4', '8.5']
        dependency-versions: ['prefer-lowest', 'prefer-stable']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, fileinfo, pdo, sqlite3, pdo_sqlite, sodium
          coverage: none
      # Override the `path` repos for the siblings not yet on Packagist
      # (installer-headless + its transitive license-verifier). package-tools, console
      # and database-tools resolve from Packagist. `no-api: true` git-clones the repos
      # instead of hitting the GitHub REST API (avoids HTTP 429 rate limits).
      - name: Resolve unpublished laranail packages from VCS
        run: |
          composer config repositories.installer-headless '{"type":"vcs","url":"https://github.com/laranail/installer-headless","no-api":true}'
          composer config repositories.license-verifier '{"type":"vcs","url":"https://github.com/laranail/license-verifier","no-api":true}'
      - name: Install dependencies
        run: |
          if [ "${{ matrix.dependency-versions }}" = "prefer-lowest" ]; then
            composer update --prefer-lowest --prefer-stable --no-interaction --no-progress
          else
            composer update --prefer-stable --no-interaction --no-progress
          fi
      - name: Run Pest
        run: vendor/bin/pest --colors=always
