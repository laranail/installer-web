name: Release

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'

jobs:
  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - name: Extract this version's CHANGELOG section
        id: changelog
        run: |
          version="${GITHUB_REF_NAME#v}"
          notes=$(awk -v v="$version" '
            $0 ~ "^## \\[" v "\\]" { f=1; next }
            f && /^## \[/ { exit }
            f { print }
          ' CHANGELOG.md)
          {
            echo "body<<__EOF__"
            if [ -n "$notes" ]; then printf '%s\n' "$notes"; else
              echo "See [CHANGELOG.md](https://github.com/laranail/installer-web/blob/main/CHANGELOG.md)."
            fi
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: ${{ steps.changelog.outputs.body }}
